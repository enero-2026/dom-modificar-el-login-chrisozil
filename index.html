<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ejercicio DOM</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <form id="loginForm">
        <div class="fila">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario">
        </div>
        
        <div class="fila">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password">
        </div>

        <span id="mensaje" class="oculto">Usuario o contraseña incorrectos</span>
        
        <div class="acciones">
            <button type="button" id="iniciarSesionBtn">Iniciar sesión</button>
            <a href="#" id="linkOlvidar">Olvidé mi contraseña</a>
        </div>
    </form>

    <div id="modalFondo" class="oculto">
        <div id="modalContenido">
            <h3>Restablecer contraseña</h3>
            <p>Ingresa tu correo para recibir un link:</p>
            <input type="email" placeholder="correo@ejemplo.com" id="correoRecuperar">
            <div class="modalAcciones">
                <button type="button" id="enviarCorreo">Enviar</button>
                <button type="button" id="cerrarModal">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
